name: Release Module

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Repository name'
        required: true
        type: string
      tag:
        description: 'Git tag to build'
        required: true
        type: string

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          path: meta

      - name: Run ci-setup
        shell: powershell
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: meta\ci-setup.ps1 -Token $env:GH_PAT

      - name: Override module with tag
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          $module = "${{ inputs.repo }}"
          $tag = "${{ inputs.tag }}"
          $dir = switch ($module) {
            "minusframework-core"         { "Core" }
            "minusframework-orm"          { "ORM" }
            "minusframework-migrator"     { "Migrator" }
            "minusframework-featureflags" { "FeatureFlags" }
            "minusframework-messaging"    { "Messaging" }
            "minusframework-telemetry"    { "Telemetry" }
            "minusframework-extensions"   { "Extensions" }
            "minusframework-ai"           { "AI" }
          }
          git -C "meta\$dir" fetch origin tag $tag
          if ($LASTEXITCODE -ne 0) { throw "git fetch failed" }
          git -C "meta\$dir" checkout $tag
          if ($LASTEXITCODE -ne 0) { throw "git checkout failed" }

      - name: Build
        shell: powershell
        env:
          BDS: "C:\Program Files (x86)\Embarcadero\Studio\23.0"
          BDSINCLUDE: "C:\Program Files (x86)\Embarcadero\Studio\23.0\include"
          FrameworkDir: "C:\Windows\Microsoft.NET\Framework64\v4.0.30319"
        run: |
          $msbuild = if (Get-Command msbuild -ErrorAction SilentlyContinue) { "msbuild" } else { "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe" }
          $module = "${{ inputs.repo }}"
          $dir = switch ($module) {
            "minusframework-core"         { "Core" }
            "minusframework-orm"          { "ORM" }
            "minusframework-migrator"     { "Migrator" }
            "minusframework-featureflags" { "FeatureFlags" }
            "minusframework-messaging"    { "Messaging" }
            "minusframework-telemetry"    { "Telemetry" }
            "minusframework-extensions"   { "Extensions" }
            "minusframework-ai"           { "AI" }
          }
          $projects = switch ($module) {
            "minusframework-core"         { @("meta\$dir\Packages\MinusFramework_Runtime.dproj", "meta\$dir\Packages\MinusFramework_Design.dproj") }
            "minusframework-orm"          { @("meta\$dir\MinusORM.dproj") }
            "minusframework-migrator"     { @("meta\$dir\MinusMigrator_DLL.dproj", "meta\$dir\MinusMigrator_CLI.dproj", "meta\$dir\MinusMigrator_GUI.dproj") }
            "minusframework-featureflags" { @("meta\$dir\FeatureFlags\MinusFeatureFlags.dproj", "meta\$dir\FeatureFlags\API\MinusFeatureFlagsAPI.dproj") }
            "minusframework-messaging"    { @("meta\$dir\Packages\MinusMessaging_Runtime.dproj", "meta\$dir\Packages\MinusMessaging_Design.dproj", "meta\$dir\MinusMessaging_CLI.dproj") }
            "minusframework-telemetry"    { @("meta\$dir\Packages\MinusTelemetry_Runtime.dproj") }
            "minusframework-extensions"   { @() }
            "minusframework-ai"           { @("meta\$dir\Source\MinusAI_MCP.dproj") }
          }
          foreach ($proj in $projects) {
            Write-Host "Building $proj..."
            & $msbuild $proj /p:Config=Release /p:Platform=Win32
            if ($LASTEXITCODE -ne 0) { throw "msbuild failed for $proj" }
          }

      - name: Publish Release
        shell: powershell
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          $params = @{
            Module   = "${{ inputs.repo }}"
            Tag      = "${{ inputs.tag }}"
            RootDir  = "${{ github.workspace }}\meta"
            Token    = $env:GH_PAT
          }
          & "${{ github.workspace }}\meta\Installer\build-module.ps1" @params
