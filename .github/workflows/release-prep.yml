name: Release Prep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check CI setup script exists
        run: |
          if [ ! -f ci-setup.ps1 ]; then
            echo "ERROR: ci-setup.ps1 not found!"
            exit 1
          fi
          echo "CI setup script is present."

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check for secrets in files
        run: |
          if grep -r "private.pem" --include="*.pem" . 2>/dev/null; then
            echo "ERROR: private.pem found in repository!"
            exit 1
          fi
          echo "No secrets found."
