name: Release Prep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Submodules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Check all submodules
        run: |
          git submodule status
          MISSING=0
          while IFS= read -r line; do
            if [[ $line == -* ]]; then
              echo "MISSING: $line"
              MISSING=1
            fi
          done < <(git submodule status)
          if [ "$MISSING" -eq 1 ]; then
            echo "Some submodules are not initialized!"
            exit 1
          fi
          echo "All submodules are present."

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for secrets in files
        run: |
          if grep -r "private.pem" --include="*.pem" . 2>/dev/null; then
            echo "ERROR: private.pem found in repository!"
            exit 1
          fi
          echo "No secrets found."
