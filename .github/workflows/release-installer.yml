name: Build Installer

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: false

jobs:
  build-installer:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v7

      - name: Build Installer
        shell: powershell
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          & .\Installer\build-installer.ps1 -Token $env:GH_PAT

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: Dist\MinusFramework-*-Setup.exe
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: ncipollo/release-action@v1
        with:
          artifacts: Dist\MinusFramework-*-Setup.exe
          tag: ${{ github.event.inputs.version || github.ref_name }}
          name: MinusFramework ${{ github.event.inputs.version || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          draft: true
