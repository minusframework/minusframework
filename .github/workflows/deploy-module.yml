name: Deploy Module

on:
  workflow_dispatch:
    inputs:
      repo:
        required: true
      tag:
        required: true

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7
        with:
          path: meta

      - shell: powershell
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: meta\ci-setup.ps1 -Token $env:GH_PAT

      - shell: powershell
        run: |
          $m = "${{ inputs.repo }}"
          $t = "${{ inputs.tag }}"
          $d = switch ($m) {
            "minusframework-core"         { "Core" }
            "minusframework-orm"          { "ORM" }
            "minusframework-migrator"     { "Migrator" }
            "minusframework-featureflags" { "FeatureFlags" }
            "minusframework-messaging"    { "Messaging" }
            "minusframework-telemetry"    { "Telemetry" }
            "minusframework-extensions"   { "Extensions" }
            "minusframework-ai"           { "AI" }
          }
          git -C "meta\$d" fetch origin tag $t
          if ($LASTEXITCODE -ne 0) { throw "fetch failed" }
          git -C "meta\$d" checkout $t
          if ($LASTEXITCODE -ne 0) { throw "checkout failed" }

      - shell: powershell
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          & "${{ github.workspace }}\meta\Installer\build-module.ps1" -Module "${{ inputs.repo }}" -Tag "${{ inputs.tag }}" -RootDir "${{ github.workspace }}\meta" -Token $env:GH_PAT
