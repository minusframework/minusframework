name: Review PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: windows-latest
    steps:
      - name: Checkout main repo
        run: |
          git clone --depth=50 https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git .
          git fetch origin ${{ github.event.pull_request.head.sha }}
          git checkout ${{ github.event.pull_request.head.sha }}

      - name: Checkout review action
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/minusframework/minusframework-ai.git _reviewer

      - name: Run MinusAI Reviewer
        id: reviewer
        shell: pwsh
        run: |
          $exe = "${{ github.workspace }}/_reviewer/.github/actions/review-pr/MinusAI_Reviewer.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "MinusAI_Reviewer.exe not found at $exe"
            exit 1
          }
          $env:GITHUB_TOKEN = "${{ secrets.GITHUB_TOKEN }}"
          & $exe --repo "${{ github.repository }}" --pr "${{ github.event.pull_request.number }}" --event opened

      - name: Approve if review passed
        if: success()
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --body "MinusAI review passed. No issues found."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
