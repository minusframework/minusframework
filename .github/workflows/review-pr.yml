name: Review PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        run: |
          git clone --depth=50 https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git .
          git fetch origin ${{ github.event.pull_request.head.sha }}
          git checkout ${{ github.event.pull_request.head.sha }}

      - name: Checkout review action
        run: git clone --depth=1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/minusframework/minusframework-ai.git _reviewer

      - name: MinusAI Code Review
        uses: ./_reviewer/.github/actions/review-pr
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
          repo: ${{ github.repository }}
