name: Review PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: windows-latest
    steps:
      - name: Clone repository
        shell: pwsh
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git .
          git fetch --depth=1 origin ${{ github.event.pull_request.head.sha }}
          git checkout ${{ github.event.pull_request.head.sha }}

      - uses: actions/checkout@v4
        with:
          repository: minusframework/minusframework-ai
          token: ${{ secrets.GH_PAT }}
          path: _reviewer

      - name: MinusAI Code Review
        uses: ./_reviewer/.github/actions/review-pr
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
          repo: ${{ github.repository }}
