<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinusAI Review Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>MinusAI Review</h1>
        <div class="user-info">
            <span>{{ .email }}</span>
            <a href="/">Logout</a>
        </div>
    </header>
    <main>
        <h2>Recent Reviews</h2>
        <div id="reviews-list"><p>Loading...</p></div>
    </main>
    <script>
        fetch('/api/reviews')
            .then(r => r.json())
            .then(reviews => {
                const list = document.getElementById('reviews-list');
                list.innerHTML = reviews.map(r => `
                    <div class="review-card">
                        <a href="/dashboard/reviews/${r.id}">
                            <strong>${r.repo_full_name}#${r.pr_number}</strong>
                        </a>
                        <span class="status ${r.status}">${r.status}</span>
                        <span class="date">${new Date(r.created_at).toLocaleDateString()}</span>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
